

<!DOCTYPE html>
    <html lang="ru">
        <!-- Сгенерировано нейросетью  -->
        <head>
            <meta charset="UTF-8">
            <title></title>
            <style>
                body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f9; text-align: center; }
                button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
                button:hover { background: #0056b3; }
                .status { margin-top: 20px; font-weight: bold; color: green; }
            </style>
        </head>
        <body>
            <h1></h1>
            <p>Нажимай на кнопку, чтобы генерировать трафик и метрики.</p>
            <button onclick="generateTraffic()">Запрос</button>
            <div class="status" id="status"></div>

            <script>
                function generateTraffic() {
                    document.getElementById('status').innerText = 'Запрос отправлен!';
                    fetch('/').then(() => {
                        setTimeout(() => {
                            document.getElementById('status').innerText = 'Успешно! Метрики обновлены в /metrics';
                        }, 500);
                    });
                }
            </script>
        </body>
    </html>
